name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  rust:
    name: Rust (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: std-linux
            target: x86_64-unknown-linux-gnu
            run: cargo test --workspace --all-targets
          - name: no-std-linux
            target: x86_64-unknown-linux-gnu
            run: cargo build -p dotrc-core --no-default-features
          - name: wasm
            target: wasm32-unknown-unknown
            run: cargo build -p dotrc-core-wasm --target wasm32-unknown-unknown --release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Build / Test
        run: ${{ matrix.run }}

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter dotrc-worker run typecheck

      - name: Test
        run: pnpm --filter dotrc-worker test

      - name: Integration test
        run: pnpm --filter dotrc-worker run test:integration
