name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Pin third-party action to a specific commit for supply-chain safety
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GH_PAT_RELEASEPLEASE }}

      # Build artifacts when a release is created
      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6

      - name: Install Rust
        if: ${{ steps.release.outputs.release_created }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Determine released packages
        if: ${{ steps.release.outputs.release_created }}
        id: released
        run: |
          echo "paths_released=${{ steps.release.outputs.paths_released }}" >> "$GITHUB_OUTPUT"
          echo "Released paths: ${{ steps.release.outputs.paths_released }}"

      # NOTE: no_std validation is covered in the CI matrix. We intentionally
      # do not build/upload a separate no_std artifact here to keep releases lean.

      - name: Build WASM (dotrc-core-wasm)
        if: ${{ steps.release.outputs.release_created && contains(steps.release.outputs.paths_released, 'crates/dotrc-core-wasm') }}
        run: |
          cargo build -p dotrc-core-wasm --release --target wasm32-unknown-unknown

      - name: Upload WASM artifact
        if: ${{ steps.release.outputs.release_created && contains(steps.release.outputs.paths_released, 'crates/dotrc-core-wasm') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ steps.release.outputs.tag_name }} \
            target/wasm32-unknown-unknown/release/dotrc_core_wasm.wasm#dotrc-core-wasm-wasm32.wasm

      - name: Build Server (dotrc-server)
        if: ${{ steps.release.outputs.release_created && contains(steps.release.outputs.paths_released, 'crates/dotrc-server') }}
        run: |
          cargo build -p dotrc-server --release

      - name: Upload Server artifact
        if: ${{ steps.release.outputs.release_created && contains(steps.release.outputs.paths_released, 'crates/dotrc-server') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ steps.release.outputs.tag_name }} \
            target/release/dotrc-server#dotrc-server-linux-x86_64

      # Publish @unstable-studios/dotrc to GitHub Package Registry
      - name: Install pnpm
        if: ${{ steps.release.outputs.release_created && contains(steps.release.outputs.paths_released, 'packages/dotrc') }}
        run: npm install -g pnpm

      - name: Setup Node.js
        if: ${{ steps.release.outputs.release_created && contains(steps.release.outputs.paths_released, 'packages/dotrc') }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        if: ${{ steps.release.outputs.release_created && contains(steps.release.outputs.paths_released, 'packages/dotrc') }}
        run: pnpm install --frozen-lockfile

      - name: Build SDK (dependency)
        if: ${{ steps.release.outputs.release_created && contains(steps.release.outputs.paths_released, 'packages/dotrc') }}
        run: pnpm --filter dotrc-sdk run build

      - name: Build @unstable-studios/dotrc
        if: ${{ steps.release.outputs.release_created && contains(steps.release.outputs.paths_released, 'packages/dotrc') }}
        run: pnpm --filter @unstable-studios/dotrc run build

      - name: Publish @unstable-studios/dotrc
        if: ${{ steps.release.outputs.release_created && contains(steps.release.outputs.paths_released, 'packages/dotrc') }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          pnpm --filter @unstable-studios/dotrc publish --no-git-checks
