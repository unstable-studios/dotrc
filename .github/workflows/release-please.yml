name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Build artifacts when a release is created
      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Install Rust
        if: ${{ steps.release.outputs.release_created }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build artifacts
        if: ${{ steps.release.outputs.release_created }}
        run: |
          cargo build -p dotrc-core --release
          cargo build -p dotrc-core --release --no-default-features
          cargo build -p dotrc-core-wasm --release --target wasm32-unknown-unknown
          cargo build -p dotrc-server --release

      - name: Upload artifacts to release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ steps.release.outputs.tag_name }} \
            target/wasm32-unknown-unknown/release/dotrc_core_wasm.wasm \
            target/release/dotrc-server
