name: Conventional Commits Validation

on:
  push:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install commitlint
        run: npm install -D @commitlint/cli @commitlint/config-conventional

      - name: Print versions
        run: |
          git --version
          node --version
          npm --version
          npx commitlint --version

      - name: Validate current commit (push)
        if: github.event_name == 'push'
        run: npx commitlint --last --verbose

      - name: Auto-fix PR title trailing spaces
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          TRIMMED=$(echo "$TITLE" | sed 's/[[:space:]]*$//')
          if [ "$TITLE" != "$TRIMMED" ]; then
            echo "Trimming trailing spaces from PR title"
            gh pr edit ${{ github.event.pull_request.number }} --title "$TRIMMED"
          fi

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          TRIMMED=$(echo "$TITLE" | sed 's/[[:space:]]*$//')
          echo "$TRIMMED" | npx commitlint --verbose

      - name: Validate PR commits (range)
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
