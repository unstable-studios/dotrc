name: Validate PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            docs
            refactor
            test
            chore
            ci
          scopes: |
            core
            wasm
            server
            worker
            web
            sdk
            docs
          requireScope: false
          subjectPattern: ^(?![A-Z]).+[^.]$
          subjectPatternError: "Subject must start with lowercase and not end with period"
          wip: true
          validateSingleCommit: false
