# Docker Compose for local development with dotrc-server
#
# Usage:
#   docker compose up -d postgres minio  # Start dependencies
#   # Apply migrations manually: psql $DATABASE_URL -f migrations/001_initial_schema.sql
#   cargo run -p dotrc-server             # Run server locally
#
# Or run everything:
#   docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dotrc
      POSTGRES_USER: dotrc
      POSTGRES_PASSWORD: dotrc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  server:
    build:
      context: ../..
      dockerfile: crates/dotrc-server/Dockerfile
    environment:
      DATABASE_URL: postgres://dotrc:dotrc@postgres:5432/dotrc
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: dotrc-attachments
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      RUST_LOG: info
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - minio

volumes:
  postgres_data:
  minio_data:
